name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch: # 手動トリガーも許可（テスト用）

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: termrain

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14            # Apple Silicon ランナー (ネイティブ)
            target: aarch64-apple-darwin
            archive: tar.gz
          - os: macos-14            # macos-13 のキューが混むので、Apple Silicon で cross-compile
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "version=manual-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Package (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          # Homebrew Formula が `bin.install "termrain"` 一発で済むよう、
          # アーカイブのトップに binary とドキュメントを直接置く
          # (サブディレクトリで包まない)
          name="${BIN_NAME}-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          mkdir staging
          cp "target/${{ matrix.target }}/release/${BIN_NAME}" staging/
          cp README.md README.ja.md LICENSE staging/ 2>/dev/null || true
          tar -czf "${name}.tar.gz" -C staging .
          shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256"

      - name: Package (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $name = "${env:BIN_NAME}-${{ steps.ver.outputs.version }}-${{ matrix.target }}"
          New-Item -ItemType Directory -Path "staging" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${env:BIN_NAME}.exe" "staging/"
          if (Test-Path README.md)    { Copy-Item README.md staging/ }
          if (Test-Path README.ja.md) { Copy-Item README.ja.md staging/ }
          if (Test-Path LICENSE)      { Copy-Item LICENSE staging/ }
          Compress-Archive -Path "staging/*" -DestinationPath "$name.zip"
          (Get-FileHash "$name.zip" -Algorithm SHA256).Hash + "  $name.zip" | Out-File "$name.zip.sha256" -Encoding ascii

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            ${{ env.BIN_NAME }}-*.tar.gz
            ${{ env.BIN_NAME }}-*.tar.gz.sha256
            ${{ env.BIN_NAME }}-*.zip
            ${{ env.BIN_NAME }}-*.zip.sha256
          if-no-files-found: ignore

  release:
    name: publish release
    needs: build
    runs-on: ubuntu-latest
    # tag push の時だけリリース化（workflow_dispatch では artifact だけ作ってリリース化はスキップ）
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Flatten artifacts
        shell: bash
        run: |
          mkdir -p release
          find artifacts -type f \( -name "*.tar.gz" -o -name "*.zip" -o -name "*.sha256" \) -exec cp {} release/ \;
          ls -la release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          draft: false
          generate_release_notes: true

  update-homebrew:
    name: update homebrew formula
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Update formula
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          VERSION: ${{ github.ref_name }}
        run: |
          SHA_ARM=$(awk '{print $1}' artifacts/aarch64-apple-darwin/termrain-${VERSION}-aarch64-apple-darwin.tar.gz.sha256)
          SHA_INTEL=$(awk '{print $1}' artifacts/x86_64-apple-darwin/termrain-${VERSION}-x86_64-apple-darwin.tar.gz.sha256)
          SHA_LINUX=$(awk '{print $1}' artifacts/x86_64-unknown-linux-gnu/termrain-${VERSION}-x86_64-unknown-linux-gnu.tar.gz.sha256)
          VER=${VERSION#v}

          cat > termrain.rb << FORMULA
          class Termrain < Formula
            desc "Terminal weather forecast and rain radar TUI (JMA + Open-Meteo, Kitty graphics)"
            homepage "https://github.com/iorinu/termrain"
            version "${VER}"
            license "MIT"

            if OS.mac?
              if Hardware::CPU.arm?
                url "https://github.com/iorinu/termrain/releases/download/${VERSION}/termrain-${VERSION}-aarch64-apple-darwin.tar.gz"
                sha256 "${SHA_ARM}"
              end
              if Hardware::CPU.intel?
                url "https://github.com/iorinu/termrain/releases/download/${VERSION}/termrain-${VERSION}-x86_64-apple-darwin.tar.gz"
                sha256 "${SHA_INTEL}"
              end
            end
            if OS.linux? && Hardware::CPU.intel?
              url "https://github.com/iorinu/termrain/releases/download/${VERSION}/termrain-${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${SHA_LINUX}"
            end

            def install
              bin.install "termrain"

              doc_files = Dir["README.*", "readme.*", "LICENSE", "LICENSE.*", "CHANGELOG.*"]
              leftover = Dir["*"] - doc_files - ["termrain"]
              pkgshare.install(*leftover) unless leftover.empty?
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/termrain --version")
            end
          end
          FORMULA

          # heredoc のインデント除去
          sed -i 's/^          //' termrain.rb

          # 現在のファイル SHA を取得
          FILE_SHA=$(curl -s \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            https://api.github.com/repos/iorinu/homebrew-tap/contents/Formula/termrain.rb \
            | jq -r '.sha')

          # base64 エンコードして API で更新
          CONTENT=$(base64 -w0 termrain.rb)
          curl -s -X PUT \
            -H "Authorization: token $HOMEBREW_TAP_TOKEN" \
            -H "Content-Type: application/json" \
            https://api.github.com/repos/iorinu/homebrew-tap/contents/Formula/termrain.rb \
            -d "{\"message\":\"chore: bump termrain to ${VERSION}\",\"content\":\"${CONTENT}\",\"sha\":\"${FILE_SHA}\"}" \
            | jq -r '.commit.html_url // .message'
